<button
  type="button"
  class="audio-toggle"
  [class.is-on]="enabled()"
  (click)="onToggle()"
  [attr.aria-pressed]="enabled()"
  [attr.aria-label]="enabled() ? 'Désactiver le son' : 'Activer le son'"
  [attr.data-cursor]="enabled() ? '→ MUTE' : '→ UNMUTE'"
>
  <span class="audio-toggle__bars" aria-hidden="true">
    <span></span><span></span><span></span><span></span>
  </span>
  <span class="audio-toggle__label">
    {{ enabled() ? 'SOUND : ON' : 'SOUND : OFF' }}
  </span>
</button>
